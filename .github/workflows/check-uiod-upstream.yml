name: Check UIOD upstream

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: "0 */12 * * *"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: check-uiod-upstream
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  update-gui-files:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        id: checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Cache SteamCMD
        id: cache-steamcmd
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
        with:
          path: .steamcmd-cache/steamcmd
          key: steamcmd-${{ runner.os }}-v1

      - name: Cache workshop content
        id: cache-workshop-content
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
        with:
          path: .steamcmd-cache/content
          key: steam-workshop-uiod-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            steam-workshop-uiod-${{ runner.os }}-

      - name: Report cache state
        id: report-cache-state
        run: |
          set -euo pipefail
          echo "SteamCMD cache hit: ${{ steps.cache-steamcmd.outputs.cache-hit }}"
          echo "Workshop content cache hit: ${{ steps.cache-workshop-content.outputs.cache-hit }}"
          ls -la "$GITHUB_WORKSPACE/.steamcmd-cache/steamcmd" || true
          ls -la "$GITHUB_WORKSPACE/.steamcmd-cache/content" || true

      - name: Install SteamCMD dependencies
        id: install-dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y ca-certificates curl lib32gcc-s1 lib32stdc++6

      - name: Install SteamCMD
        id: install-steamcmd
        run: |
          set -euo pipefail
          mkdir -p "$GITHUB_WORKSPACE/.steamcmd-cache/steamcmd"
          mkdir -p "$GITHUB_WORKSPACE/.steamcmd-cache/content"
          if [ ! -x "$GITHUB_WORKSPACE/.steamcmd-cache/steamcmd/steamcmd.sh" ]; then
            curl -fsSL https://steamcdn-a.akamaihd.net/client/installer/steamcmd_linux.tar.gz \
              | tar -xz -C "$GITHUB_WORKSPACE/.steamcmd-cache/steamcmd"
          fi

      - name: Download UI Overhaul Dynamic
        id: download-uiod
        run: |
          set -euo pipefail
          "$GITHUB_WORKSPACE/.steamcmd-cache/steamcmd/steamcmd.sh" \
            +force_install_dir "$GITHUB_WORKSPACE/.steamcmd-cache/content" \
            +login anonymous \
            +workshop_download_item 281990 1623423360 validate \
            +workshop_download_item 281990 1780481482 validate \
            +workshop_download_item 281990 3090328185 validate \
            +quit

      - name: Update vendored and patched GUI files
        id: update-gui-files
        run: |
          set -euo pipefail
          python scripts/update_uiod_gui.py \
            "$GITHUB_WORKSPACE/.steamcmd-cache/content/steamapps/workshop/content/281990/1623423360/interface/main.gui" \
            --variant uiod \
            --update
          python scripts/update_uiod_gui.py \
            "$GITHUB_WORKSPACE/.steamcmd-cache/content/steamapps/workshop/content/281990/1780481482/interface/main_topbar.gui" \
            --variant uiod-et \
            --update
          python scripts/update_uiod_gui.py \
            "$GITHUB_WORKSPACE/.steamcmd-cache/content/steamapps/workshop/content/281990/3090328185/interface/main_topbar.gui" \
            --variant uiod-etfdlc \
            --update

      - name: Verify generated patched files
        id: verify-generated
        run: python scripts/update_uiod_gui.py --check-generated --all

      - name: Run unit tests
        id: unit-tests
        run: python -m unittest discover -s tests -p "test_*.py"

      - name: Detect GUI baseline changes
        id: detect-gui-changes
        run: |
          set -euo pipefail
          if git diff --quiet -- \
            vendor/uiod/1623423360/interface/main.gui \
            vendor/uiod-et/1780481482/interface/main_topbar.gui \
            vendor/uiod-etfdlc/3090328185/interface/main_topbar.gui \
            patched/uiod-plus-mp-spacebar-pause/interface/main.gui \
            patched/uiod-et-plus-mp-spacebar-pause/interface/main_topbar.gui \
            patched/uiod-etfdlc-plus-mp-spacebar-pause/interface/main_topbar.gui; then
            echo "gui_changed=false" >> "$GITHUB_OUTPUT"
            echo "No GUI baseline changes detected."
          else
            echo "gui_changed=true" >> "$GITHUB_OUTPUT"
            echo "GUI baseline changes detected."
          fi

      - name: Refresh status badges
        id: refresh-status-badges
        if: steps.detect-gui-changes.outputs.gui_changed == 'true'
        run: |
          set -euo pipefail
          python scripts/update_status_badges.py \
            --sync-status synced \
            --uiod-descriptor "$GITHUB_WORKSPACE/.steamcmd-cache/content/steamapps/workshop/content/281990/1623423360/descriptor.mod" \
            --workshop-acf "$GITHUB_WORKSPACE/.steamcmd-cache/content/steamapps/workshop/appworkshop_281990.acf" \
            --uiod-file-fallback vendor/uiod/1623423360/interface/main.gui

      - name: Create update pull request
        id: create-pull-request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1
        with:
          branch: update-uiod-gui-baselines
          title: Update UIOD GUI baselines
          commit-message: Update UIOD GUI baselines
          body: |
            One or more UI Overhaul Dynamic workshop files changed.

            This PR updates the vendored upstream GUI files, regenerates the patched GUI files with the spacebar pause patch reapplied, and refreshes generated status badges for the changed baseline.
          add-paths: |
            vendor/uiod/1623423360/interface/main.gui
            vendor/uiod-et/1780481482/interface/main_topbar.gui
            vendor/uiod-etfdlc/3090328185/interface/main_topbar.gui
            patched/uiod-plus-mp-spacebar-pause/interface/main.gui
            patched/uiod-et-plus-mp-spacebar-pause/interface/main_topbar.gui
            patched/uiod-etfdlc-plus-mp-spacebar-pause/interface/main_topbar.gui
            badges/index.json
            badges/metadata.json
            README.md

      - name: Summarize action execution
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
          CHECKOUT_OUTCOME: ${{ steps.checkout.outcome }}
          STEAMCMD_CACHE_OUTCOME: ${{ steps.cache-steamcmd.outcome }}
          WORKSHOP_CACHE_OUTCOME: ${{ steps.cache-workshop-content.outcome }}
          STEAMCMD_CACHE_HIT: ${{ steps.cache-steamcmd.outputs.cache-hit }}
          WORKSHOP_CACHE_HIT: ${{ steps.cache-workshop-content.outputs.cache-hit }}
          CACHE_STATE_OUTCOME: ${{ steps.report-cache-state.outcome }}
          INSTALL_DEPS_OUTCOME: ${{ steps.install-dependencies.outcome }}
          INSTALL_STEAMCMD_OUTCOME: ${{ steps.install-steamcmd.outcome }}
          DOWNLOAD_OUTCOME: ${{ steps.download-uiod.outcome }}
          UPDATE_OUTCOME: ${{ steps.update-gui-files.outcome }}
          VERIFY_OUTCOME: ${{ steps.verify-generated.outcome }}
          TEST_OUTCOME: ${{ steps.unit-tests.outcome }}
          DETECT_GUI_CHANGES_OUTCOME: ${{ steps.detect-gui-changes.outcome }}
          GUI_CHANGED: ${{ steps.detect-gui-changes.outputs.gui_changed }}
          BADGES_OUTCOME: ${{ steps.refresh-status-badges.outcome }}
          PR_OUTCOME: ${{ steps.create-pull-request.outcome }}
          PR_OPERATION: ${{ steps.create-pull-request.outputs.pull-request-operation }}
          PR_NUMBER: ${{ steps.create-pull-request.outputs.pull-request-number }}
          PR_URL: ${{ steps.create-pull-request.outputs.pull-request-url }}
          PR_BRANCH: update-uiod-gui-baselines
        run: |
          set -euo pipefail
          if [ -n "$PR_URL" ]; then
            pr_result="[$PR_URL]($PR_URL)"
          elif [ "$PR_OUTCOME" = "success" ]; then
            pr_result="No PR created because the generated files produced no changes ahead of main."
          elif [ "$PR_OUTCOME" = "skipped" ]; then
            pr_result="No PR created because the create-pull-request step was skipped after an earlier issue."
          else
            pr_result="No PR created because the create-pull-request step did not complete successfully."
          fi

          if [ "$JOB_STATUS" = "success" ]; then
            issues="None."
          else
            issues="Review the step status table and logs for the failed or skipped step."
          fi

          cat >> "$GITHUB_STEP_SUMMARY" <<SUMMARY
          ## UIOD upstream check

          **Status:** $JOB_STATUS

          ### Inputs

          | Name | Value |
          | --- | --- |
          | Trigger | $GITHUB_EVENT_NAME |
          | Branch | $GITHUB_REF_NAME |
          | Commit | $GITHUB_SHA |
          | Steam app ID | 281990 |
          | Workshop items | 1623423360, 1780481482, 3090328185 |
          | PR branch | $PR_BRANCH |

          ### Outputs

          | Name | Value |
          | --- | --- |
          | SteamCMD cache outcome | $STEAMCMD_CACHE_OUTCOME |
          | SteamCMD cache hit | ${STEAMCMD_CACHE_HIT:-false} |
          | Workshop cache outcome | $WORKSHOP_CACHE_OUTCOME |
          | Workshop cache hit | ${WORKSHOP_CACHE_HIT:-false} |
          | GUI baseline changed | ${GUI_CHANGED:-false} |
          | PR operation | ${PR_OPERATION:-none} |
          | PR number | ${PR_NUMBER:-none} |
          | PR result | $pr_result |

          ### Step Status

          | Step | Outcome |
          | --- | --- |
          | Check out repository | $CHECKOUT_OUTCOME |
          | Cache SteamCMD | $STEAMCMD_CACHE_OUTCOME |
          | Cache workshop content | $WORKSHOP_CACHE_OUTCOME |
          | Report cache state | $CACHE_STATE_OUTCOME |
          | Install SteamCMD dependencies | $INSTALL_DEPS_OUTCOME |
          | Install SteamCMD | $INSTALL_STEAMCMD_OUTCOME |
          | Download UI Overhaul Dynamic | $DOWNLOAD_OUTCOME |
          | Update vendored and patched GUI files | $UPDATE_OUTCOME |
          | Verify generated patched files | $VERIFY_OUTCOME |
          | Run unit tests | $TEST_OUTCOME |
          | Detect GUI baseline changes | $DETECT_GUI_CHANGES_OUTCOME |
          | Refresh status badges | $BADGES_OUTCOME |
          | Create update pull request | $PR_OUTCOME |

          ### Issues

          $issues
          SUMMARY
