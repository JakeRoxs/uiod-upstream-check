name: SonarQube

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  sonar:
    name: Analyze
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # Shallow clones should be disabled for a better relevancy of analysis

      - name: Read badge version
        id: badge-version
        run: |
          version="$(python -c 'import json; print(json.load(open("badges/metadata.json", encoding="utf-8"))["version"])')"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Install coverage
        run: python -m pip install coverage

      - name: Run tests with coverage
        run: python -m coverage run --source=scripts -m unittest discover -s tests -p "test_*.py"

      - name: Generate coverage report
        run: python -m coverage xml

      - uses: SonarSource/sonarqube-scan-action@713881670b6b3676cda39549040e2d88c70d582e # v8.2.0
        with:
          args: -Dsonar.projectVersion=${{ steps.badge-version.outputs.version }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
